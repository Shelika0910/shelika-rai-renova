{% extends "base.html" %}

{% block title %}Password Reset Complete | ReNova{% endblock %}

{% block extra_css %}
<style>
    .auth-wrap {
        min-height: 72vh;
        display: grid;
        place-items: center;
        padding: 28px 0 44px;
    }

    .info-card {
        width: min(500px, calc(100% - 40px));
        background: #fff;
        border: 1px solid #e8dfd8;
        border-radius: 24px;
        padding: 44px 36px;
        text-align: center;
        box-shadow: 0 22px 48px rgba(31, 42, 55, 0.09);
    }

    .icon-circle {
        width: 68px; height: 68px;
        background: linear-gradient(135deg, #d4edda, #b8e4c2);
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-size: 2rem;
        margin: 0 auto 20px;
    }

    .info-card h1 { margin: 0 0 10px; font-size: 1.7rem; color: #1e2b37; }
    .info-card p  { color: #5f6b7a; margin: 0 0 24px; line-height: 1.6; }

    .login-btn {
        display: inline-block;
        padding: 12px 28px;
        border-radius: 999px;
        background: linear-gradient(135deg, #4da3a9, #3a8f95);
        color: #fff; font-weight: 700; font-size: 0.95rem;
    }
    .login-btn:hover { background: linear-gradient(135deg, #3c8b90, #2f7d83); }
</style>
{% endblock %}

{% block content %}
<section class="auth-wrap">
    <div class="info-card">
        <div class="icon-circle">✓</div>
        <h1>Password Updated!</h1>
        <p>
            Your password has been successfully reset.<br>
            You can now sign in with your new password.
        </p>
        <a href="{% url 'accounts:login' %}" class="login-btn">Sign In Now</a>
    </div>
</section>
{% endblock %}
